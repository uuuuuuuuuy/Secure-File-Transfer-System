<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>服务器监控面板</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <header class="page-header">
      <div>
        <h1>安全文件传输 · 服务器监控</h1>
        <p>查看已注册客户端、最近的文件传输以及 CRC 状态，便于集中运维。</p>
      </div>
      <div class="actions">
        <a class="button" href="{{ url_for('files_browser') }}" target="_blank" rel="noreferrer">打开文件目录</a>
      </div>
    </header>

    <main class="layout">
      <section class="panel" id="totals-panel">
        <h2>统计信息</h2>
        <dl class="stats">
          <div>
            <dt>注册客户端</dt>
            <dd id="total-clients">0</dd>
          </div>
          <div>
            <dt>历史传输</dt>
            <dd id="total-transfers">0</dd>
          </div>
          <div>
            <dt>CRC 已确认</dt>
            <dd id="total-verified">0</dd>
          </div>
          <div>
            <dt>待确认</dt>
            <dd id="total-pending">0</dd>
          </div>
        </dl>
        <div class="server-info">
          <h3>服务器地址</h3>
          <ul id="server-hosts" class="host-list"></ul>
          <p class="port-info">TCP 监听端口：<span id="server-tcp-port">-</span></p>
        </div>
      </section>

      <section class="panel" id="clients-panel">
        <div class="panel-header">
          <h2>客户端列表</h2>
          <button type="button" id="refresh-clients">立即刷新</button>
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th>客户端名称</th>
              <th>客户端 ID</th>
              <th>最近在线</th>
              <th>最近 IP</th>
              <th>公钥</th>
              <th>AES</th>
            </tr>
          </thead>
          <tbody id="clients-body">
            <tr class="empty"><td colspan="6">暂无数据</td></tr>
          </tbody>
        </table>
      </section>

      <section class="panel" id="transfers-panel">
        <div class="panel-header">
          <h2>最近传输</h2>
          <button type="button" id="refresh-transfers">立即刷新</button>
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th>时间</th>
              <th>客户端</th>
              <th>文件名</th>
              <th>保存路径</th>
              <th>来源 IP</th>
              <th>CRC 状态</th>
            </tr>
          </thead>
          <tbody id="transfers-body">
            <tr class="empty"><td colspan="6">暂无记录</td></tr>
          </tbody>
        </table>
      </section>
    </main>

    <footer class="page-footer">
      <small>监控面板仅展示信息，不会对既有协议造成影响。</small>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
  </body>
</html>
