<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>服务器监控面板</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <header class="page-header">
      <h1>安全文件传输 · 服务端监控面板</h1>
      <p>实时查看客户端注册信息与传输的文件记录，便于统一管理。</p>
    </header>

    <main class="layout">
      <section class="panel panel-overview">
        <div class="panel-header">
          <h2>运行概览</h2>
          <button id="refresh-all" type="button" class="refresh">立即刷新</button>
        </div>
        <dl class="overview">
          <div>
            <dt>注册客户端</dt>
            <dd id="stat-clients">0</dd>
          </div>
          <div>
            <dt>文件传输次数</dt>
            <dd id="stat-transfers">0</dd>
          </div>
          <div>
            <dt>已确认校验</dt>
            <dd id="stat-verified">0</dd>
          </div>
        </dl>
        <p class="muted">数据每 5 秒自动刷新一次，也可以手动点击上方按钮立即更新。</p>
      </section>

      <section class="panel panel-clients">
        <h2>注册客户端</h2>
        <p class="muted">点击某一行可查看该客户端的详细传输记录。</p>
        <div class="table-wrapper">
          <table class="data-table" id="clients-table">
            <thead>
              <tr>
                <th>客户端 ID</th>
                <th>用户名</th>
                <th>最近上线</th>
                <th>最近 IP</th>
                <th>文件数量</th>
                <th>密钥状态</th>
              </tr>
            </thead>
            <tbody id="clients-tbody">
              <tr><td colspan="6" class="empty">暂无客户端</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="panel panel-transfers">
        <div class="panel-header">
          <h2>文件传输记录</h2>
          <p id="transfer-filter" class="muted">当前显示：全部客户端</p>
        </div>
        <div class="table-wrapper">
          <table class="data-table" id="transfers-table">
            <thead>
              <tr>
                <th>时间</th>
                <th>客户端</th>
                <th>文件名</th>
                <th>大小</th>
                <th>保存路径</th>
                <th>来源 IP</th>
                <th>CRC 状态</th>
              </tr>
            </thead>
            <tbody id="transfers-tbody">
              <tr><td colspan="7" class="empty">暂无文件传输记录</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <footer class="page-footer">
      <small>该面板仅用于监控服务器接收的文件和客户端状态，所有上传及密钥协商仍通过原有协议执行。</small>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
  </body>
</html>
